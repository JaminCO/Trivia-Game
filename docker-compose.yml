# docker-compose.yml
services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: trivia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia
      POSTGRES_DB: trivia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    platform: linux/amd64
    container_name: trivia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: