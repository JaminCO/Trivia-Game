# docker-compose.yml
services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: trivia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia
      POSTGRES_DB: trivia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    platform: linux/amd64
    container_name: trivia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./trivia-backend
    platform: linux/amd64
    container_name: trivia-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres.xxcjxilaujjaqnpcyoyc:asdfpoiuerts@aws-1-eu-west-1.pooler.supabase.com:5432/postgres
      REDIS_URL: redis://default:ch4P0lzDOcEDeBbxM2rkGemmKVsNhdnK@redis-10034.c262.us-east-1-3.ec2.cloud.redislabs.com:10034
      SECRET_KEY: development-secret
    volumes:
      - ./trivia-backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: node:20-alpine
    platform: linux/amd64
    container_name: trivia-frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./trivia-frontend:/app
      - frontend-node-modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]

volumes:
  pgdata:
  redisdata:
  frontend-node-modules:
